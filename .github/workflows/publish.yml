name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Checkout React cache peer
        uses: actions/checkout@v6
        with:
          repository: superflag-sh/react
          path: cache-peer
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run release:check
        env:
          SUPERFLAG_CACHE_PEER_DIR: cache-peer
      - run: mkdir package-artifact && npm pack --ignore-scripts --pack-destination package-artifact
      - uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: package-artifact/*.tgz
          if-no-files-found: error

  publish:
    needs: release-check
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.6.3
      - uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: package-artifact
      - run: npm publish package-artifact/*.tgz --access public --ignore-scripts
