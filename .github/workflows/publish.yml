name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run release:check
      - run: mkdir package-artifact && npm pack --ignore-scripts --pack-destination package-artifact
      - uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: package-artifact/*.tgz
          if-no-files-found: error

  publish:
    if: github.event_name == 'release'
    needs: release-check
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11.6.3
      - uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: package-artifact
      - run: npm publish ./package-artifact/*.tgz --access public --ignore-scripts

  artifact-handoff:
    if: github.event_name == 'workflow_dispatch'
    needs: release-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: package-artifact
      - name: Verify the packed artifact handoff
        shell: bash
        run: |
          mapfile -t packages < <(find package-artifact -maxdepth 1 -type f -name '*.tgz')
          [[ "${#packages[@]}" -eq 1 ]]
          tar -tzf "${packages[0]}" >/dev/null
