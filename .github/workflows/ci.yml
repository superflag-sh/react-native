name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Checkout core SDK
        uses: actions/checkout@v6
        with:
          repository: superflag-sh/core
          path: core-peer
      - name: Checkout React cache peer
        uses: actions/checkout@v6
        with:
          repository: superflag-sh/react
          path: cache-peer
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run release:check
        env:
          SUPERFLAG_CORE_DIR: core-peer
          SUPERFLAG_CACHE_PEER_DIR: cache-peer
